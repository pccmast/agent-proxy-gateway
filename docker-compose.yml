services:
  gateway:
    build:
      context: .
      target: gateway
    container_name: agent-gateway
    ports:
      - "18080:18080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=18080
      - GATEWAY_CONFIG_DIR=/app/config
    volumes:
      - gateway_data:/app/data
      - ./config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:18080/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  dashboard:
    build:
      context: .
      target: dashboard
    container_name: agent-gateway-dashboard
    ports:
      - "8502:8502"
    environment:
      - GATEWAY_URL=http://gateway:18080
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped

volumes:
  gateway_data:
